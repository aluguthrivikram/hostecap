<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - KSRMCE</title>
<style>
/* --- PRESERVED STUDENT STYLES --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", sans-serif;}
body{display:flex;min-height:100vh;background:linear-gradient(135deg,#dfe9f3,#ffffff);overflow:hidden;}
.sidebar{width:250px;height:100vh;z-index:2;backdrop-filter:blur(70px);background:rgba(255,255,255,0.2);border-right:1px solid rgba(255,255,255,0.4);padding:20px;}
.menu div{padding:12px;margin:10px 0;border-radius:14px;cursor:pointer;background:rgba(255,255,255,0.2);transition:.3s;}
.menu div:hover{background:rgba(255,255,255,0.5);transform:translateX(5px);}
.main{flex:1;padding:30px;overflow-y:auto;z-index:2;}
.card{backdrop-filter:blur(70px);background:rgba(255,255,255,0.3);border-radius:25px;padding:25px;border:1px solid rgba(255,255,255,0.4);margin-bottom:20px;}
.bar-container{background:#eee; height:35px; border-radius:20px; overflow:hidden; margin-top:15px; position:relative;}
#percBar{height:100%; width:0%; background:linear-gradient(to right, #4caf50, #8bc34a); transition:1.5s;}
#percText{position:absolute; right:15px; top:8px; font-weight:bold;}
.file-card { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #7aa8ff;}
.hidden{display:none;}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Student Panel</h2>
    <div class="menu">
        <div onclick="show('home')">🏠 Dashboard</div>
        <div onclick="show('att-sec')">📊 Attendance</div>
        <div onclick="show('files-sec')">📂 Study Material</div>
    </div>
    <div onclick="logout()" style="color:red; cursor:pointer; margin-top:30px; padding:12px;">Logout</div>
</div>

<div class="main">
    <div id="home" class="section">
        <div class="card"><h2>Welcome</h2><p>Roll No: <b id="uRoll"></b></p></div>
    </div>

    <div id="att-sec" class="section hidden">
        <div class="card">
            <h2>My Cloud Attendance</h2>
            <p>Total Classes: <b id="t">0</b> | Present: <b id="p" style="color:green;">0</b></p>
            <div class="bar-container"><div id="percBar"></div><span id="percText">0%</span></div>
        </div>
    </div>

    <div id="files-sec" class="section hidden">
        <div class="card">
            <h2>Classroom Materials</h2>
            <div id="fileList">Fetching materials...</div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCHS6YQr6jx3oQwSaoi-CTJBPk6MsCwOvY",
    authDomain: "clg-web-918e8.firebaseapp.com",
    projectId: "clg-web-918e8",
    storageBucket: "clg-web-918e8.firebasestorage.app",
    messagingSenderId: "284984143990",
    appId: "1:284984143990:web:010826a68926fc8a21af57"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const myRoll = localStorage.getItem("roll");
document.getElementById("uRoll").innerText = myRoll;

window.show = (id) => {
    document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'att-sec') fetchAttendance();
    if(id === 'files-sec') fetchFiles();
};

async function fetchAttendance() {
    const docRef = doc(db, "attendance", myRoll);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
        const data = docSnap.data();
        const perc = Math.round((data.present / data.total) * 100);
        document.getElementById("t").innerText = data.total;
        document.getElementById("p").innerText = data.present;
        document.getElementById("percBar").style.width = perc + "%";
        document.getElementById("percText").innerText = perc + "%";
    }
}

async function fetchFiles() {
    // For testing, we assume the student is in CSE-A-3rdYear
    const q = query(collection(db, "files"), where("className", "==", "CSE-A-3rdYear"));
    const querySnapshot = await getDocs(q);
    const container = document.getElementById("fileList");
    container.innerHTML = "";
    
    querySnapshot.forEach((doc) => {
        const data = doc.data();
        container.innerHTML += `
            <div class="file-card">
                <span>${data.fileName}</span>
                <a href="${data.fileUrl}" target="_blank" style="color:#7aa8ff; font-weight:bold;">Download</a>
            </div>
        `;
    });
}

window.logout = () => { localStorage.clear(); window.location.href="index.html"; };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSRMCE Glassy Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #eef2f7;
  overflow: hidden;
}

/* BACKGROUND DECO */
body::before, body::after {
  content: "";
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(140px);
  opacity: .5;
  z-index: 1;
}
body::before { background: #7aa8ff; top: -120px; left: -120px; }
body::after { background: #7fffd4; bottom: -120px; right: -120px; }

/* BANNER */
.banner-container {
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: center;
  z-index: 2;
}
.glass-banner {
  width: 100%;
  max-width: 1100px;
  padding: 15px 25px;
  border-radius: 25px;
  backdrop-filter: blur(40px);
  background: rgba(255, 221, 5, 0.4);
  border: 1px solid rgba(255, 255, 255, .5);
  text-align: center;
}

/* CARD */
.main-content {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}
.card {
  width: 370px;
  padding: 30px 25px;
  border-radius: 35px;
  backdrop-filter: blur(60px);
  background: rgba(255, 255, 255, .25);
  border: 1px solid rgba(255, 255, 255, .5);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

/* TABS */
.tabs {
  position: relative;
  display: flex;
  background: rgba(0, 0, 0, .06);
  border-radius: 20px;
  padding: 5px;
  margin-bottom: 25px;
}
.slider {
  position: absolute;
  top: 5px;
  left: 5px;
  width: calc(33.33% - 10px);
  height: calc(100% - 10px);
  border-radius: 15px;
  background: rgba(255, 255, 255, .9);
  transition: .4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  z-index: 2;
  font-weight: 600;
  font-size: 14px;
}

/* FORMS WRAPPER */
.wrapper {
  overflow: hidden;
  width: 100%;
}

.forms {
  display: flex;
  width: 300%;
  transition: transform .4s ease-in-out;
}

.form {
  flex: 0 0 33.333%;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.form h3 {
  margin-bottom: 10px;
  font-size: 18px;
  color: #333;
}

/* INPUT STYLING */
.field {
  position: relative;
}
.field input {
  width: 100%;
  padding: 20px 14px 10px;
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.1);
  background: rgba(255, 255, 255, 0.8);
  color: #000;
  outline: none;
}
.field label {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  transition: .3s;
  pointer-events: none;
  color: #666;
}
.field input:focus+label,
.field input:not(:placeholder-shown)+label {
  top: 12px;
  font-size: 11px;
  color: #000;
  font-weight: 700;
}

/* BUTTON */
.btn {
  width: 100%;
  margin-top: 25px;
  padding: 15px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, .5);
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(20px);
  cursor: pointer;
  font-weight: 700;
  transition: 0.3s;
}
.btn:hover {
  background: rgba(255, 255, 255, 0.9);
}

/* LOADER OVERLAY */
#loader-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.spinner {
  width: 50px; height: 50px;
  border: 5px solid rgba(255, 221, 5, 0.3);
  border-top: 5px solid #ffdd05;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div id="loader-overlay"><div class="spinner"></div></div>

<div class="banner-container">
  <div class="glass-banner">
    <h2>KSRMCE Portal</h2>
  </div>
</div>

<div class="main-content">
  <div class="card">
    <div class="tabs">
      <div class="slider" id="slider"></div>
      <div class="tab" onclick="switchTab(0)">Staff</div>
      <div class="tab" onclick="switchTab(1)">Student</div>
      <div class="tab" onclick="switchTab(2)">Parent</div>
    </div>

    <div class="wrapper">
      <div class="forms" id="forms">
        <div class="form">
          <h3>STAFF LOGIN</h3>
          <div class="field"><input type="text" placeholder=" " id="staffId"><label>Admin No</label></div>
          <div class="field"><input type="password" placeholder=" " id="staffPass"><label>Password</label></div>
        </div>
        <div class="form">
          <h3>STUDENT LOGIN</h3>
          <div class="field"><input type="text" placeholder=" " id="studentId"><label>Roll No</label></div>
          <div class="field"><input type="password" placeholder=" " id="studentPass"><label>Password</label></div>
        </div>
        <div class="form">
          <h3>PARENT LOGIN</h3>
          <div class="field"><input type="text" placeholder=" " id="parentId"><label>Roll No</label></div>
          <div class="field"><input type="password" placeholder=" " id="parentPass"><label>Password</label></div>
        </div>
      </div>
    </div>

    <button class="btn" id="loginBtn">Login as Staff</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCHS6YQr6jx3oQwSaoi-CTJBPk6MsCwOvY",
    authDomain: "clg-web-918e8.firebaseapp.com",
    projectId: "clg-web-918e8",
    storageBucket: "clg-web-918e8.firebasestorage.app",
    messagingSenderId: "284984143990",
    appId: "1:284984143990:web:010826a68926fc8a21af57",
    measurementId: "G-XCF4Y79Q0T"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let currentTab = 0;
  const forms = document.getElementById('forms');
  const slider = document.getElementById('slider');
  const formItems = document.querySelectorAll('.form');
  const loginBtn = document.getElementById('loginBtn');
  const loader = document.getElementById('loader-overlay');

  // Tab Switching Logic
  window.switchTab = (index) => {
    currentTab = index;
    forms.style.transform = "translateX(-" + (index * 33.333) + "%)";
    slider.style.transform = "translateX(" + (index * 100) + "%)";
    const roles = ["Staff", "Student", "Parent"];
    loginBtn.innerText = "Login as " + roles[index];
  };

  // The Login Function
  window.handleLogin = async () => {
    const activeForm = formItems[currentTab];
    const inputs = activeForm.querySelectorAll('input');

    let rollOrAdminNo = inputs[0].value.trim(); 
    let password = inputs[1].value.trim();

    if (!rollOrAdminNo || !password) {
      alert("Please enter your credentials");
      return;
    }

    // UI Loading State
    loader.style.display = 'flex';
    loginBtn.innerText = "Verifying...";
    loginBtn.disabled = true;

    // STEP: Convert Roll No to Virtual Email for Firebase
    const virtualEmail = `${rollOrAdminNo}@ksrm.edu`;

    try {
      // Direct Sign-in
      await signInWithEmailAndPassword(auth, virtualEmail, password);
      
      // Success Logic Redirection
      if (currentTab === 0) {
        localStorage.setItem("role", "staff");
        window.location.href = "staff2.html";
      } else if (currentTab === 1) {
        localStorage.setItem("role", "student");
        localStorage.setItem("roll", rollOrAdminNo);
        window.location.href = "student2.html";
      } else {
        localStorage.setItem("role", "parent");
        window.location.href = "parent2.html";
      }
    } catch (error) {
      // Revert UI on error
      loader.style.display = 'none';
      const roles = ["Staff", "Student", "Parent"];
      loginBtn.innerText = "Login as " + roles[currentTab];
      loginBtn.disabled = false;

      // Specific Error Handling
      if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
        alert("Invalid Roll No/Admin No or Password.");
      } else if (error.code === 'auth/wrong-password') {
        alert("Incorrect Password.");
      } else {
        alert("Login failed: " + error.message);
      }
    }
  };

  // Bind the function to the button
  loginBtn.onclick = window.handleLogin;
</script>

</body>
</html>
